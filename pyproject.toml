[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["sapl_base", "sapl_fastapi", "sapl_django", "sapl_flask"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
