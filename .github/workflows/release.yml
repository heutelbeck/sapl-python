name: Release on PyPI

on:
  push:
    tags:
      - v*

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [sapl_base, sapl_django, sapl_fastapi, sapl_flask, sapl_tornado]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./sapl_base[dev]
          if [ "${{ matrix.package }}" != "sapl_base" ]; then pip install ./${{ matrix.package }}[dev]; fi
      - name: Test ${{ matrix.package }}
        run: |
          cd ${{ matrix.package }}
          python -m pytest

  release:
    needs: run-tests
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        package: [sapl_base, sapl_django, sapl_fastapi, sapl_flask, sapl_tornado]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build ${{ matrix.package }}
        run: python -m build ./${{ matrix.package }}
      - name: Publish ${{ matrix.package }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./${{ matrix.package }}/dist
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}

  remove-on-failure:
    if: ${{ failure() }}
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Remove triggering tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: "tags/${{ github.ref_name }}"
                })
            } catch (e) {
              console.log("The tag doesn't exist yet: " + e)
            }
