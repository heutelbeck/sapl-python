name: Release on PyPI

on:
  push:
    tags:
      - v*

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [sapl_base, sapl_sqlalchemy, sapl_pymongo, sapl_django, sapl_fastapi, sapl_flask, sapl_tornado, sapl_fastmcp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./sapl_base[dev]
          # sapl_sqlalchemy (and its sqlalchemy + aiosqlite dependencies) backs the cross-package
          # transaction and SQL query-rewriting integration tests in the framework packages.
          pip install ./sapl_sqlalchemy[dev]
          if [ "${{ matrix.package }}" != "sapl_base" ] && [ "${{ matrix.package }}" != "sapl_sqlalchemy" ]; then pip install ./${{ matrix.package }}[dev]; fi
      - name: Test ${{ matrix.package }}
        run: |
          cd ${{ matrix.package }}
          python -m pytest

  release:
    needs: run-tests
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        package: [sapl_base, sapl_sqlalchemy, sapl_pymongo, sapl_django, sapl_fastapi, sapl_flask, sapl_tornado, sapl_fastmcp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build ${{ matrix.package }}
        run: python -m build ./${{ matrix.package }}
      - name: Publish ${{ matrix.package }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ./${{ matrix.package }}/dist
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          # Make the release idempotent: a re-run after a partial publish (or a
          # transient failure part-way through the matrix) skips the versions that
          # already uploaded and publishes only the missing ones.
          skip-existing: true

  remove-on-failure:
    if: ${{ failure() }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Remove triggering tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: "tags/${{ github.ref_name }}"
                })
            } catch (e) {
              console.log("The tag doesn't exist yet: " + e)
            }
