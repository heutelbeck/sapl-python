name: release on PyPI

on:
  push:
    tags:
      - sapl_base_v*
      - sapl_fastapi_v*
      - sapl_django_v*
      - sapl_flask_v*

jobs:
  identify-package:
    outputs:
      packagename: ${{ steps.packagename.outputs.packagename }}
    runs-on: ubuntu-latest
    steps:
      - name: allow only push to master
        if: ${{ !(github.event.base_ref == 'refs/heads/master') }}
        run: exit 1
      - id: packagename
        run: |
          if ${{ startsWith(github.ref_name, 'sapl_base_v') }}; then echo "packagename=sapl_base" >> "$GITHUB_OUTPUT"
          elif ${{ startsWith(github.ref_name, 'sapl_fastapi_v') }}; then echo "packagename=sapl_fastapi" >> "$GITHUB_OUTPUT"
          elif ${{ startsWith(github.ref_name, 'sapl_django_v') }}; then echo "packagename=sapl_django" >> "$GITHUB_OUTPUT"
          elif ${{ startsWith(github.ref_name, 'sapl_flask_v') }}; then echo "packagename=sapl_flask" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      - name: notag
        if: ${{ !steps.packagename.outputs.packagename }}
        run: exit 1

  run-tests:
    needs: identify-package
    runs-on: ubuntu-latest
    env:
      identifier: ${{ needs.identify-package.outputs.packagename }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install ./sapl_base[dev]
          if [ "${{ env.identifier }}" != "sapl_base" ]; then pip install ./${{ env.identifier }}[dev]; fi
      - name: Testing
        run: |
          cd ${{ env.identifier }}
          python -m pytest

  release:
    needs: [identify-package, run-tests]
    runs-on: ubuntu-latest
    env:
      identifier: ${{ needs.identify-package.outputs.packagename }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build ${{ env.identifier }}
        run: python -m build ./${{ env.identifier }}
      - name: Publish ${{ env.identifier }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./${{ env.identifier }}/dist
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}

  remove-on-failure:
    if: ${{ failure() }}
    needs: [release, run-tests, identify-package]
    runs-on: ubuntu-latest
    steps:
      - name: remove triggering Tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: "tags/${{ github.ref_name }}"
                })
            } catch (e) {
              console.log("The tag doesn't exist yet: " + e)
            }
