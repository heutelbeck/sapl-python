name: Integration tests (SAPL Node)

# The container integration tests in sapl_base/tests/integration run the PDP client
# against a real SAPL Node. They need the sapl-node image locally; if it is absent the
# whole suite skips. The image is the published release pulled from ghcr.io.

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.gitignore'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sapl-node-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out sapl-python
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Pull SAPL Node image
        run: docker pull ghcr.io/heutelbeck/sapl-node:4.1.2

      # The ITs drive a wire protocol against a Java Node, so they are largely Python-version
      # independent. Run them on the ceiling of the supported range only (newest asyncio is
      # the one place version drift bites the transport); the 3.12 floor is covered by tests.yml.
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install sapl_base
        run: |
          python -m pip install --upgrade pip
          pip install ./sapl_base[dev]

      - name: Run sapl_base integration tests
        run: |
          cd sapl_base
          python -m pytest tests/integration -v
