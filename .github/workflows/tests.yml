name: Test push and pull-request to Master
on:
  push:
    branches: [master]
    paths-ignore:
      - '.github/**'
      - '**.gitignore'
      - '**.md'
  pull_request:
    branches: [master]
jobs:
  test-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
        package: [sapl_base, sapl_sqlalchemy, sapl_pymongo, sapl_fastapi, sapl_django, sapl_flask, sapl_tornado, sapl_fastmcp]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./sapl_base[dev]
          # sapl_sqlalchemy (and its sqlalchemy + aiosqlite dependencies) backs the cross-package
          # transaction and SQL query-manipulation integration tests in the framework packages.
          pip install ./sapl_sqlalchemy[dev]
          if [ "${{ matrix.package }}" != "sapl_base" ] && [ "${{ matrix.package }}" != "sapl_sqlalchemy" ]; then pip install ./${{ matrix.package }}[dev]; fi
      - name: Lint with ruff
        run: |
          pip install ruff==0.15.4
          ruff check ${{ matrix.package }}/src/ ${{ matrix.package }}/tests/
      - name: Test ${{ matrix.package }}
        run: |
          cd ${{ matrix.package }}
          python -m pytest -v
